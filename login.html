<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ZitBoard</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-container">
      <!-- Left Imagery -->
      <div class="auth-side-image">

        <div class="auth-image-content">
          <div class="amu-logo" style="font-weight: bold; font-size: 2.2rem; background: linear-gradient(45deg, #2dd4bf, #ffffff, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;">ZitBoard</div>
        </div>
        <div class="auth-image-content" style="max-width: 400px; padding-bottom: 2rem;">
          <h2>Your Business Runs.<br><em>You Decide What On.</em></h2>
          <p style="color: #cbd5e1; margin-top: 1rem; font-size: 1.1rem; line-height: 1.5;">AI that scores your leads, automates your workflows, and chases invoices — <em>so the only thing left on your plate is the work you actually want to do.</em></p>
        </div>
      </div>
      <!-- Right Form -->
      <div class="auth-side-form">
        <button class="theme-toggle btn-icon auth-theme-toggle" aria-label="Toggle Dark Mode">
          <i data-lucide="sun" class="icon-sun" width="18" height="18"></i>
          <i data-lucide="moon" class="icon-moon" width="18" height="18" style="display:none;"></i>
        </button>
        <h1>Welcome back</h1>
        <p class="subtitle">Don't have an account? <a href="signup.html">Sign up</a></p>

        <form onsubmit="event.preventDefault();">
          <div class="auth-form-grid full">
            <input type="email" class="auth-input" placeholder="Email" aria-label="Email">
            <input type="password" class="auth-input" placeholder="Password" aria-label="Password">
          </div>
          
          <div class="auth-checkbox" style="justify-content: space-between;">
            <label style="display:flex; align-items:center; gap:0.5rem;">
              <input type="checkbox"> Remember me
            </label>
            <a href="forgot.html" style="margin-left: auto;">Forgot password?</a>
          </div>

          <button class="auth-btn-primary" type="submit">Log In</button>
        </form>

        <div class="auth-divider">Or log in with</div>
        <div class="social-btns">
          <button class="social-btn" type="button">
            <svg style="margin-right: 8px; width: 18px; height: 18px;" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="social-btn" type="button">
            <svg style="margin-right: 8px; width: 18px; height: 18px;" viewBox="0 0 384 512" fill="currentColor">
              <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 24 184.5 15.6 245.8c-15.4 73 22.8 171.3 63.6 229.4 17.6 25 35.8 45.4 63.1 44.9 26.1-.5 36.3-15.9 66.8-15.9 30.5 0 40 16.2 67.2 15.6 27.6-.6 42.4-19.3 58.9-43.5 20.9-31.9 29.5-62 30-63.5-2.5-1.4-40.4-15.4-46.5-56.7zm-40-192.4c17.6-21.2 31.1-52.5 25.1-80.3-25.2 2.1-57 15.6-76 34.6-17.1 16.8-31 46.5-25.9 76.2 28.5 2.1 57.8-11.4 76.8-30.5z"/>
            </svg> Apple
          </button>
        </div>
      </div>
    </div>
  </div>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
