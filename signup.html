<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - ZitBoard</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-container">
      <!-- Left Imagery -->
      <div class="auth-side-image">

        <div class="auth-image-content">
          <div class="amu-logo" style="font-weight: bold; font-size: 2.2rem; background: linear-gradient(45deg, #2dd4bf, #ffffff, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;">ZitBoard</div>
        </div>
        <div class="auth-image-content" style="max-width: 400px; padding-bottom: 2rem;">
          <h2>Your Business Runs.<br><em>You Decide What On.</em></h2>
          <p style="color: #cbd5e1; margin-top: 1rem; font-size: 1.1rem; line-height: 1.5;">AI that scores your leads, automates your workflows, and chases invoices — <em>so the only thing left on your plate is the work you actually want to do.</em></p>
        </div>
      </div>
      <!-- Right Form -->
      <div class="auth-side-form">
        <button class="theme-toggle btn-icon auth-theme-toggle" aria-label="Toggle Dark Mode">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <h1>Create an account</h1>
        <p class="subtitle">Already have an account? <a href="login.html">Log in</a></p>

        <form onsubmit="event.preventDefault();">
          <div class="auth-form-grid">
            <input type="text" class="auth-input" placeholder="First name" aria-label="First Name">
            <input type="text" class="auth-input" placeholder="Last name" aria-label="Last Name">
          </div>
          <div class="auth-form-grid full">
            <input type="email" class="auth-input" placeholder="Email" aria-label="Email">
            <div class="auth-input-group">
              <input type="password" class="auth-input" placeholder="Enter your password" aria-label="Password">
            </div>
          </div>
          
          <button class="auth-btn-primary" type="submit">Create account</button>
        </form>

        <div class="auth-divider">Or register with</div>
        <div class="social-btns">
          <button class="social-btn" type="button" aria-label="Register with Google">Google</button>
          <button class="social-btn" type="button" aria-label="Register with Apple">Apple</button>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/script.js"></script>
</body>
</html>
