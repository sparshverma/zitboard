<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/webp" href="logo_nobg.webp">
  <title>Sign Up - ZitBoard</title>
  <script src="assets/js/theme-bootstrap.js"></script>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-container">
      <!-- Left Imagery -->
      <div class="auth-side-image">

        <div class="auth-image-content">
          <div class="amu-logo auth-brand-gradient">ZitBoard</div>
        </div>
        <div class="auth-image-content auth-image-copy">
          <h2>Your Business Runs.<br><em>You Decide What On.</em></h2>
          <p class="auth-hero-description">AI that scores your leads, automates your workflows, and chases invoices — <em>so the only thing left on your plate is the work you actually want to do.</em></p>
        </div>
      </div>
      <!-- Right Form -->
      <div class="auth-side-form">
        <button class="theme-toggle btn-icon auth-theme-toggle" aria-label="Toggle Dark Mode">
          <i data-lucide="sun" class="icon-sun" width="18" height="18"></i>
          <i data-lucide="moon" class="icon-moon icon-moon-hidden" width="18" height="18"></i>
        </button>
        <h1>Create an account</h1>
        <p class="subtitle">Already have an account? <a href="login.html">Log in</a></p>

        <form action="signup.html" id="signupForm">
          <div class="auth-form-grid">
            <input type="text" class="auth-input" placeholder="First name" aria-label="First Name" required>
            <input type="text" class="auth-input" placeholder="Last name" aria-label="Last Name" required>
          </div>
          <div class="auth-form-grid full">
            <input type="email" class="auth-input" placeholder="Email" aria-label="Email" required>
            <div class="auth-input-group">
              <input type="password" class="auth-input" placeholder="Enter your password" aria-label="Password" required>
            </div>
          </div>
          
          <button class="auth-btn-primary" type="submit">Create account</button>
        </form>

        <div class="auth-divider">Or register with</div>
        <div class="social-btns">

          <button class="social-btn" type="button" data-provider="google">
            <svg class="social-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="social-btn" type="button" data-provider="microsoft">
            <svg class="social-icon" viewBox="0 0 21 21"><path fill="#f35325" d="M1 1h9v9H1z"/><path fill="#81bc06" d="M11 1h9v9h-9z"/><path fill="#05a6f0" d="M1 11h9v9H1z"/><path fill="#ffba08" d="M11 11h9v9h-9z"/></svg>
            Microsoft
          </button>
          <button class="social-btn" type="button" data-provider="twitter">
            <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Twitter
          </button>
          </div>
      </div>
    </div>
  </div>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Supabase Auth -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/script.js"></script>
</body>
</html>
